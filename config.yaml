# pokebot-3ds configuration

# Bot mode. One of: observe, encounter, soft_reset
mode: observe

# Optional: explicit game registry key (otherwise auto-detected by title ID).
# Available keys: X-USA, Y-USA, OR-USA, AS-USA, SM-USA-1.2, USUM-USA-1.2
# game: USUM-USA-1.2

# Connection to Azahar
rpc:
  host: 127.0.0.1
  port: 45987
  connect_timeout: 30

# Input driver (pynput-based keyboard simulation).
# Azahar must remain focused for keystrokes to register.
input:
  dry_run: false
  binds:
    A:        a
    B:        s
    X:        z
    Y:        x
    L:        q
    R:        w
    Start:    m
    Select:   n
    DpadUp:   t
    DpadDown: g
    DpadLeft: f
    DpadRight: h

# Mode-specific options
soft_reset:
  read_slot: 0           # which party slot the gift Pokemon lands in
  advance_taps: 60       # generic-mode mashes (non-X/Y games)
  advance_gap: 3.0       # seconds between presses for the pre-menu /
                         # navigation phase of the X/Y sequence
  post_reset_wait: 12.0  # seconds after L+R+Start to wait for boot logos
                         # (Nintendo 3DS + Game Freak) before mashing
  post_reset_taps: 6     # A presses through Title -> Continue -> save flash
                         # back to the saved tile
  post_reset_gap: 1.0    # seconds between each post-reset A press

  # X/Y starter sequence — manually counted on real hardware.
  xy_pre_taps:  25       # A presses to clear Tierno's dialogue
  xy_post_taps: 40       # B presses to receive the starter (hard cap;
                         # the bot exits early as soon as slot 0 has a
                         # valid PK6 record, so the actual count is
                         # usually much lower once party_base is known)
                         # (B avoids opening the nickname-entry screen)
  xy_receive_gap: 1.0    # seconds between each B press in the receive
                         # phase. Faster than advance_gap because the
                         # receive dialogue advances quickly with B.

  # Trainer name (in-game OT name, exactly as you set it). Used as
  # a fast RAM anchor: the bot searches for this string as UTF-16LE
  # to locate party_base in seconds, even when slot 0 is empty.
  # Once a successful brute-force scan finds party_base AND this
  # string is set, the bot caches `trainer_to_party_offset` below
  # automatically. Subsequent runs skip the PK6 scan entirely.
  trainer_name: Roman
  # trainer_to_party_offset: 0x...  # written automatically
  # Optional: lock the bot to a specific starter for the current game.
  # Wrong-species results soft-reset without evaluating the target.
  # Names per game:
  #   X / Y                          chespin, fennekin, froakie
  #   Omega Ruby / Alpha Sapphire    treecko, torchic, mudkip
  #   Sun / Moon / USUM              rowlet, litten, popplio
  # starter: chespin

# Memory offsets for your specific game/version.
# Run `python -m pokebot.find_offsets` to discover these automatically,
# then paste the results below. Use hex (0x...) or decimal.
#
# Example for Pokémon Ultra Sun/Moon (US, v1.2):
#   party_base:     0x330D8B58
#   foe_base:       0x330D93D8
#   in_battle_flag: 0x330D9438
#   party_stride:   484
#
# Without these the dashboard will show no party or encounter data.
# Authoritative X/Y live-RAM addresses from PKMN-NTR LookupTable.cs
# (drgoku282/PKMN-NTR). These are real-hardware NTR virtual addresses;
# Azahar reads them directly (trainer region is shifted -0x10, the
# 0x088xxxxx wild region is at its native address).
offsets:
  # PartyOffset (X/Y): 6 live party slots, encrypted ekx, 484 B apart.
  party_base: 0x08CE1CF8
  party_stride: 484
  # WildOffset1 (X/Y): the encounter Pokémon lives somewhere in the
  # ~128 KB at 0x08800000 — it is NOT at a fixed sub-offset; scan the
  # region for a checksum-valid encrypted PK6 (PKMN-NTR ReadOpponent).
  foe_base: 0x08800000
  foe_stride: 484
  # Live-verified: the wild sits ~0x3ecc into the window and the
  # player's battle copies ~0x4a70/0x4e38, so 0x8000 (32 KB) covers
  # everything and scans ~4x faster than 0x20000 → tighter poll loop,
  # no missed encounters.
  foe_scan_len: 0x8000
  in_battle_flag: 0x0        # TODO: not yet located (battle-state u8)

# Random-encounter shiny hunt tuning.
random_encounters:
  movement: horizontal       # horizontal (Left/Right) | vertical (Up/Down)
  walk_hold: 0.35            # seconds per step; short = tighter detection
  # RUN button touch position as window fractions (X/Y wild battle,
  # Azahar default vertical layout). Bottom screen ≈ lower window;
  # nudge these if the flee misses the RUN button.
  run_touch: [0.5, 0.92]

# Target / filter is configured in the launcher (Hunt → Target filter).
# Default is "Shiny only". To override from the CLI: pass --target shiny
# (or any|perfect5|perfect6|shiny+perfect4) to run.py.
