<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="pokebot-3ds logo">
  <title>pokebot-3ds</title>
  <defs>
    <clipPath id="ball">
      <circle cx="128" cy="128" r="116"/>
    </clipPath>
  </defs>

  <!-- Body of the Pokéball, clipped to the circle -->
  <g clip-path="url(#ball)">
    <!-- Top half: bright red -->
    <rect x="0" y="0" width="256" height="128" fill="#DC3C3C"/>
    <!-- Bottom half: off-white -->
    <rect x="0" y="128" width="256" height="128" fill="#F0F0F5"/>

    <!-- Top-half circuit traces (dark red, lower contrast than the body) -->
    <g stroke="#7E1E1E" stroke-width="3" stroke-linecap="round" fill="#7E1E1E">
      <line x1="76"  y1="36"  x2="76"  y2="100"/>
      <line x1="128" y1="36"  x2="128" y2="100"/>
      <line x1="180" y1="36"  x2="180" y2="100"/>
      <line x1="48"  y1="56"  x2="104" y2="56"/>
      <line x1="152" y1="56"  x2="208" y2="56"/>
      <line x1="48"  y1="80"  x2="114" y2="80"/>
      <line x1="142" y1="80"  x2="208" y2="80"/>
      <circle cx="48"  cy="56" r="4"/>
      <circle cx="208" cy="56" r="4"/>
      <circle cx="48"  cy="80" r="4"/>
      <circle cx="208" cy="80" r="4"/>
      <circle cx="76"  cy="36" r="4"/>
      <circle cx="128" cy="36" r="4"/>
      <circle cx="180" cy="36" r="4"/>
    </g>

    <!-- Bottom-half circuit traces (slate, reads well on the off-white) -->
    <g stroke="#465070" stroke-width="3" stroke-linecap="round" fill="#465070">
      <line x1="76"  y1="156" x2="76"  y2="220"/>
      <line x1="128" y1="156" x2="128" y2="220"/>
      <line x1="180" y1="156" x2="180" y2="220"/>
      <line x1="48"  y1="176" x2="104" y2="176"/>
      <line x1="152" y1="176" x2="208" y2="176"/>
      <line x1="48"  y1="200" x2="114" y2="200"/>
      <line x1="142" y1="200" x2="208" y2="200"/>
      <circle cx="48"  cy="176" r="4"/>
      <circle cx="208" cy="176" r="4"/>
      <circle cx="48"  cy="200" r="4"/>
      <circle cx="208" cy="200" r="4"/>
      <circle cx="76"  cy="220" r="4"/>
      <circle cx="128" cy="220" r="4"/>
      <circle cx="180" cy="220" r="4"/>
    </g>

    <!-- Equator band -->
    <rect x="0" y="120" width="256" height="16" fill="#1E1E28"/>
  </g>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="#1E1E28" stroke-width="8"/>

  <!-- Central button -->
  <circle cx="128" cy="128" r="22" fill="#1E1E28"/>
  <circle cx="128" cy="128" r="13" fill="#F0F0F5"/>
  <circle cx="128" cy="128" r="13" fill="none" stroke="#1E1E28" stroke-width="2"/>
</svg>
